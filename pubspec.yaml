name: ocr_scan_text
description: OCR Scan Text is a wrapper around the "Google ML kit Text Recognition" library.
version: 2.0.1
homepage: https://github.com/emirbashiri/ocr_scan_text

environment:
  sdk: '>=2.17.1 <3.0.0'
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  google_mlkit_text_recognition: ^0.8.1
  camera: ^0.9.7
  image: ^3.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.boursorama.ocr_scan_text.ocr_scan_text
        pluginClass: OcrScanTextPlugin
      ios:
        pluginClass: OcrScanTextPlugin
